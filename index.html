<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Renovatio Software — Independent software studio</title>
<meta name="description" content="Renovatio Software, the independent studio of Camilo Meneses: custom software, web applications and privacy-first mobile products. Choose your language — English or Español." />
<link rel="icon" type="image/svg+xml" href="assets/renovatio_icon.svg" />
<link rel="alternate" hreflang="en" href="https://renovatiosoftware.net/en/" />
<link rel="alternate" hreflang="es" href="https://renovatiosoftware.net/es/" />
<link rel="alternate" hreflang="x-default" href="https://renovatiosoftware.net/" />
<meta property="og:title" content="Renovatio Software — Independent software studio" />
<meta property="og:description" content="Custom software, web applications and privacy-first mobile products by Camilo Meneses." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://renovatiosoftware.net/" />
<script>
  // Send visitors to their language; crawlers & no-JS see the selector below.
  (function () {
    try {
      var l = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      location.replace(l.indexOf('es') === 0 ? 'es/' : 'en/');
    } catch (e) {}
  })();
</script>
<style>
  @font-face{font-family:'Onest';font-style:normal;font-weight:400 800;font-display:swap;src:url(assets/fonts/onest.woff2) format('woff2')}
  @font-face{font-family:'Geist Mono';font-style:normal;font-weight:400 600;font-display:swap;src:url(assets/fonts/geistmono.woff2) format('woff2')}
  :root{
    --ink:#0f172a;--ink-soft:#334155;--muted:#64748b;--line:#e6e8ee;
    --blue:#2563eb;--orange:#f97316;
    --font:'Onest',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--font);color:var(--ink);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;
    background:
      radial-gradient(900px 480px at 15% 5%, rgba(37,99,235,.16), transparent 60%),
      radial-gradient(900px 520px at 88% 8%, rgba(249,115,22,.15), transparent 62%),
      #ffffff;
  }
  .card{max-width:440px;width:100%;text-align:center}
  .logo{height:44px;width:auto;display:block;margin:0 auto 26px}
  .kicker{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  h1{font-size:1.35rem;font-weight:700;letter-spacing:-.01em;margin:12px 0 4px}
  p{color:var(--ink-soft);font-size:.98rem;margin-bottom:26px}
  .choices{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .choice{
    display:inline-flex;flex-direction:column;align-items:center;gap:2px;
    min-width:150px;padding:16px 24px;border:1px solid var(--line);border-radius:16px;
    background:#fff;text-decoration:none;color:var(--ink);font-weight:700;font-size:1.05rem;
    box-shadow:0 1px 2px rgba(15,23,42,.04);transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .choice:hover{transform:translateY(-2px);border-color:#cbd5e1;box-shadow:0 14px 30px -16px rgba(15,23,42,.3)}
  .choice small{font-family:var(--mono);font-weight:500;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  footer{margin-top:30px;font-size:.82rem;color:var(--muted)}
</style>
</head>
<body>
  <main class="card">
    <img class="logo" src="assets/renovatio_horizontal_claro.svg" alt="Renovatio Software" />
    <div class="kicker">Independent software studio</div>
    <h1>Choose your language</h1>
    <p>Elige tu idioma</p>
    <div class="choices">
      <a class="choice" href="en/" hreflang="en">English<small>Continue in English</small></a>
      <a class="choice" href="es/" hreflang="es">Español<small>Continuar en español</small></a>
    </div>
    <footer>© 2026 Renovatio Software · by Camilo Meneses</footer>
  </main>
</body>
</html>
